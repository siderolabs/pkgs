name: mdadm
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
  - stage: libucontext
  - stage: systemd-udevd
steps:
  - sources:
      - url: https://github.com/md-raid-utilities/mdadm/archive/refs/tags/mdadm-{{ .mdadm_version }}.tar.gz
        destination: mdadm.tar.gz
        sha256: {{ .mdadm_sha256 }}
        sha512: {{ .mdadm_sha512 }}
    prepare:
      - |
        tar -xzf mdadm.tar.gz --strip-components=1
      - |
        patch -p1 < /pkg/patches/mdadm-include-sysmacros.patch
        patch -p1 < /pkg/patches/no-werror.patch
    build:
      - |
        # build will fail if runtime dir does not exist
        mkdir -p /run/mdadm

        CXFLAGS=-D_LARGEFILE64_SOURCE \
        make -j $(nproc) mdadm
        make -j $(nproc) mdmon
    install:
      - |
        mkdir -p /rootfs/usr/bin
        cp mdadm /rootfs/usr/bin/mdadm
        cp mdmon /rootfs/usr/bin/mdmon
    test:
      - |
        fhs-validator /rootfs
    sbom:
      outputPath: /rootfs/usr/share/spdx/mdadm.spdx.json
      version: '{{ .mdadm_version }}'
      cpes:
        - cpe:2.3:a:mdadm_project:mdadm:{{ .mdadm_version }}:*:*:*:*:*:*:*
      licenses:
        - GPL-2.0-or-later
finalize:
  - from: /rootfs
    to: /rootfs
