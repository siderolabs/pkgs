name: apparmor
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
      - url: https://gitlab.com/apparmor/apparmor/-/archive/{{ .apparmor_version }}/apparmor-{{ .apparmor_version }}.tar.gz
        destination: apparmor.tar.gz
        sha256: "{{ .apparmor_sha256 }}"
        sha512: "{{ .apparmor_sha512 }}"
    prepare:
      - |
        tar -xzf apparmor.tar.gz --strip-components=1

        patch -p1 < /pkg/patches/basename.patch

        cd libraries/libapparmor
        ./autogen.sh

        ./configure \
          --disable-dependency-tracking \
          --disable-man-pages \
          --prefix=/usr
    build:
      - |
        cd libraries/libapparmor
        make -j $(nproc)
      - |
        cd parser
        make arch -j $(nproc)
    install:
      - |
        cd parser
        DISTRO=unknown make install-arch DESTDIR=/rootfs SBINDIR=/rootfs/usr/bin

        INSTALL_CONFDIR=/rootfs/etc/apparmor
        install -m 755 -d ${INSTALL_CONFDIR}
        install -m 644 parser.conf ${INSTALL_CONFDIR}
      - |
        cd profiles

        PROFILES_DEST=/rootfs/etc/apparmor.d

        install -m 755 -d ${PROFILES_DEST}
        install -m 755 -d ${PROFILES_DEST}/disable

        install -m 755 -d "${PROFILES_DEST}/abi"
        install -m 644 ./apparmor.d/abi/3.0 ${PROFILES_DEST}/abi/3.0
    test:
      - |
        fhs-validator /rootfs
    sbom:
      outputPath: /rootfs/usr/share/spdx/apparmor.spdx.json
      version: {{ .apparmor_version }}
      cpes:
        - cpe:2.3:a:apparmor:apparmor:{{ .apparmor_version }}:*:*:*:*:*:*:*
        - cpe:2.3:a:canonical:apparmor:{{ .apparmor_version }}:*:*:*:*:*:*:*
      licenses:
        - GPL-2.0-or-later
finalize:
  - from: /rootfs
    to: /
