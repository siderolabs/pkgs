name: libucontext
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
      - url: https://github.com/kaniini/libucontext/archive/refs/tags/libucontext-{{ .libucontext_version }}.tar.gz
        destination: libucontext.tar.gz
        sha256: "{{ .libucontext_sha256 }}"
        sha512: "{{ .libucontext_sha512 }}"
    env:
      ARCH: {{ if eq .ARCH "aarch64"}}aarch64{{ else if eq .ARCH "x86_64" }}x86_64{{ else }}unsupported{{ end }}
    prepare:
      - |
        tar -xzf libucontext.tar.gz --strip-components=1
    build:
      - |
        make -j $(nproc) ARCH="${ARCH}"
    install:
      - |
        make ARCH="${ARCH}" DESTDIR=/rootfs install
    test:
      - |
        fhs-validator /rootfs
    sbom:
      outputPath: /rootfs/usr/share/spdx/libucontext.spdx.json
      version: {{ .libucontext_version }}
      licenses:
        - ISC
finalize:
  - from: /rootfs
    to: /
