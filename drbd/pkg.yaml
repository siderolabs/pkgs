name: drbd-pkg
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
  - stage: kernel-build
steps:
  - sources:
      - url: https://pkg.linbit.com//downloads/drbd/{{ regexReplaceAll ".\\d+\\.\\d+$" .drbd_version "${1}" }}/drbd-{{ .drbd_version }}.tar.gz
        destination: drbd.tar.gz
        sha256: "{{ .drbd_sha256 }}"
        sha512: "{{ .drbd_sha512 }}"
    env:
      ARCH: {{ if eq .ARCH "aarch64"}}arm64{{ else if eq .ARCH "x86_64" }}x86_64{{ else }}unsupported{{ end }}
    prepare:
      - |
        tar -xzf drbd.tar.gz --strip-components=1
      - |
        # Inject the pre-generated compat patches into DRBD's cocci_cache so
        # the kernel build does not need to run spatch or contact SPAAS.
        # The cache entries are generated out of band by hack/drbd-gen-compat.sh.
        cocci_src=/pkg/cocci-cache/{{ if eq .ARCH "aarch64"}}arm64{{ else if eq .ARCH "x86_64" }}amd64{{ else }}unsupported{{ end }}
        if [ ! -d "${cocci_src}" ] || [ -z "$(ls -A "${cocci_src}" 2>/dev/null)" ]; then
            echo "ERROR: no pre-generated cocci cache found at ${cocci_src}." >&2
            echo "       Run 'hack/drbd-gen-compat.sh' (ARCH=amd64|arm64|both) and commit the results." >&2
            exit 1
        fi
        mkdir -p drbd/drbd-kernel-compat/cocci_cache/
        cp -r "${cocci_src}"/* drbd/drbd-kernel-compat/cocci_cache/
  - network: none
    env:
      ARCH: {{ if eq .ARCH "aarch64"}}arm64{{ else if eq .ARCH "x86_64" }}x86_64{{ else }}unsupported{{ end }}
      SPAAS: "false"
    build:
      - |
        make -j $(nproc) -C drbd KERNEL_SOURCES=/src MODVERSIONS=detect KDIR=/src
  - network: none
    install:
      - |
        mkdir -p /rootfs/usr/lib/modules/$(cat /src/include/config/kernel.release)/
        cp /src/modules.order /rootfs/usr/lib/modules/$(cat /src/include/config/kernel.release)/
        cp /src/modules.builtin /rootfs/usr/lib/modules/$(cat /src/include/config/kernel.release)/
        cp /src/modules.builtin.modinfo /rootfs/usr/lib/modules/$(cat /src/include/config/kernel.release)/

        make -C /src M=$(pwd)/drbd/build-current modules_install DESTDIR=/rootfs INSTALL_MOD_PATH=/rootfs/usr INSTALL_MOD_DIR=extras INSTALL_MOD_STRIP=1 CONFIG_MODULE_SIG_ALL=y
    test:
      - |
        # https://www.kernel.org/doc/html/v4.15/admin-guide/module-signing.html#signed-modules-and-stripping
        find /rootfs/usr/lib/modules -name '*.ko' -exec grep -FL '~Module signature appended~' {} \+
      - |
        fhs-validator /rootfs
finalize:
  - from: /rootfs
    to: /
