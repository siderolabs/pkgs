name: reproducibility
variant: scratch
shell: /bin/bash
dependencies:
  # base is not needed since it's toolchain modified with a local musl build, we're only interested in the reproducibility of files that go into talos
  # However, pull it in for a test script
  - stage: base
  - stage: apparmor
  # These packages are pulled through from tools, so they are tested there
  # - stage: ca-certificates
  # - stage: kmod
  # - stage: libcap
  # - stage: libselinux
  # - stage: libsepol
  # - stage: musl
  # - stage: openssl
  # - stage: pcre2
  # - stage: util-linux
  - stage: cni
  - stage: containerd
  - stage: cryptsetup
  - stage: dosfstools
  - stage: e2fsprogs
  - stage: fhs
  - stage: flannel-cni
  - stage: grub
  - stage: ipmitool
  - stage: iptables
  - stage: ipxe
  - stage: libaio
  - stage: libattr
  - stage: libinih
  - stage: libjson-c
  - stage: liblzma
  - stage: libnftnl
  - stage: libmnl
  - stage: libpopt
  - stage: libseccomp
  - stage: liburcu
  - stage: systemd-udevd
  # linux-firmware can be ignored from reproducibility test since it's a tarball downloaded and extracted (no build happens)
  # - stage: linux-firmware
  - stage: lvm2
  - stage: runc
  - stage: sd-boot
  - stage: socat
  - stage: xfsprogs
steps:
  - test:
    - |
      # Validate usrmerge symlinks from toolchain & tools did not get overwritten
      [ -L /bin ] && [ -d /bin ]
      [ -L /lib ] && [ -d /lib ]
      [ -L /lib64 ] && [ -d /lib64 ]
      [ -L /usr/lib64 ] && [ -d /usr/lib64 ]
      [ -L /sbin ] && [ -d /sbin ]
      [ -L /usr/sbin ] && [ -d /usr/sbin ]
    - |
      # Test for extra files/directories
      # go and pkg come from base
      ALLOWED_DIRS="usr etc bin sbin lib lib64 dev proc sys opt run var root tmp home go pkg"

      for dir in $(ls /); do
        if ! echo $ALLOWED_DIRS | grep -q $dir; then
          echo "Extra directory found: $dir"
          exit 1
        fi
      done

      # Ensure pkg is empty
      [ -z "$(ls /pkg)" ]"
finalize:
  - from: /
    to: /
